<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty & Passport — Seminggu Satu by Arnold</title>
    <meta name="description" content="Cek berapa kali kamu ikut event Seminggu Satu & bikin Journaling Passport-mu!">

    <script src="../env.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blue: #0046ff;
            --blue-2: #0092ff;
            --yellow: #ffe600;
            --ink: #10245e;
            --bg: #f4f7ff;
            --card: #ffffff;
            --line: #e4e9f5;
            --muted: #6b7794;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            max-width: 460px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 4rem;
        }

        /* --- Header --- */
        .top {
            text-align: center;
            padding: 1rem 0 1.5rem;
        }

        .top a {
            text-decoration: none;
        }

        .top img {
            height: 42px;
            width: auto;
        }

        .top .by {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* --- Intro / lookup --- */
        .hero-card {
            background: linear-gradient(155deg, #0043f5 0%, #0092ff 55%, #00b4ff 100%);
            color: #fff;
            border-radius: 22px;
            padding: 1.75rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0, 60, 200, .28);
        }

        .hero-card .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
        }

        .hero-card .orb.a {
            width: 160px;
            height: 160px;
            top: -50px;
            right: -40px;
            background: radial-gradient(circle, rgba(255, 230, 0, .5) 0%, transparent 70%);
        }

        .hero-card .orb.b {
            width: 120px;
            height: 120px;
            bottom: -40px;
            left: -35px;
            background: radial-gradient(circle, rgba(255, 255, 255, .3) 0%, transparent 70%);
        }

        .hero-card h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.15;
            position: relative;
            z-index: 1;
        }

        .hero-card h1 .hl {
            color: var(--yellow);
        }

        .hero-card p {
            font-size: 0.9rem;
            opacity: .95;
            margin-top: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .lookup {
            margin-top: 1.25rem;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .lookup input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 1px;
        }

        .lookup input:focus {
            outline: 3px solid rgba(255, 230, 0, .6);
        }

        .lookup button {
            width: 100%;
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 14px;
            background: var(--yellow);
            color: var(--ink);
            font-size: 1rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: transform .12s ease, filter .12s ease;
        }

        .lookup button:hover {
            filter: brightness(1.04);
        }

        .lookup button:active {
            transform: scale(.98);
        }

        .lookup button:disabled {
            opacity: .6;
            cursor: default;
        }

        .hint {
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
            margin-top: 0.9rem;
        }

        /* --- Result --- */
        #result {
            margin-top: 1.5rem;
            display: none;
        }

        .greet {
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .scard {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }

        .scard b {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--blue);
            line-height: 1;
            font-family: 'Outfit', sans-serif;
        }

        .scard span {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            display: block;
            margin-top: 0.35rem;
        }

        /* Tier */
        .tier {
            background: var(--yellow);
            color: var(--ink);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 20px rgba(0, 30, 120, .12);
        }

        .tier .em {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .tier .t {
            font-size: 1.05rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .tier .d {
            font-size: 0.8rem;
            opacity: .8;
            margin-top: 2px;
        }

        /* Reward progress */
        .reward {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 1.1rem 1.25rem;
            margin-bottom: 1rem;
        }

        .reward .rtop {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.6rem;
        }

        .reward .rtop b {
            font-size: 0.95rem;
            font-weight: 800;
        }

        .reward .rtop span {
            font-size: 0.8rem;
            color: var(--muted);
            font-weight: 700;
        }

        .stamps {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .stamp {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            border: 2px dashed var(--line);
            color: var(--line);
        }

        .stamp.on {
            background: var(--blue);
            border-color: var(--blue);
            color: var(--yellow);
            border-style: solid;
        }

        .reward .eligible {
            margin-top: 0.85rem;
            background: #e9fbf0;
            border: 1px solid #b6f0cd;
            color: #0a7a3d;
            border-radius: 12px;
            padding: 0.65rem 0.85rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
        }

        .reward .togo {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
            font-weight: 600;
        }

        .reward .togo b {
            color: var(--blue);
        }

        /* Timeline */
        .section-title {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin: 1.4rem 0 0.7rem;
        }

        .timeline {
            position: relative;
            padding-left: 1.4rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 6px;
            bottom: 6px;
            width: 2px;
            background: var(--line);
        }

        .tl-item {
            position: relative;
            padding: 0 0 1rem 0;
        }

        .tl-item::before {
            content: '';
            position: absolute;
            left: -1.4rem;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--blue);
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px var(--blue);
        }

        .tl-item .nm {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .tl-item .dt {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Passport actions */
        .pp-actions {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 1.25rem;
        }

        .btn-primary,
        .btn-ghost {
            width: 100%;
            padding: 0.9rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            border: none;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
        }

        .btn-primary:disabled {
            opacity: .6;
        }

        .btn-ghost {
            background: transparent;
            border: 1.5px solid var(--line);
            color: var(--ink);
            display: block;
        }

        .share-note {
            font-size: 0.78rem;
            color: var(--muted);
            text-align: center;
            margin-top: 0.6rem;
        }

        /* Not found / error */
        .msg-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .msg-card .em {
            font-size: 2.4rem;
        }

        .msg-card h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            margin: 0.6rem 0 0.4rem;
        }

        .msg-card p {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 1.1rem;
        }

        /* Spinner */
        .spinner {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }

        .spinner .ring {
            width: 38px;
            height: 38px;
            border: 3px solid var(--line);
            border-top-color: var(--blue);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
        }

        .spinner p {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 600;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ====== Passport card (ala Wrapped) ====== */
        .recap-story {
            width: 340px;
            max-width: 100%;
            min-height: 604px;
            margin: 1.25rem auto 0;
            border-radius: 22px;
            padding: 28px 24px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background: linear-gradient(155deg, #0043f5 0%, #0092ff 55%, #00b4ff 100%);
            font-family: 'Open Sans', sans-serif;
            box-shadow: 0 20px 60px rgba(0, 60, 200, .4);
        }

        .rs-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
        }

        .rs-orb.a {
            width: 200px;
            height: 200px;
            top: -60px;
            right: -50px;
            background: radial-gradient(circle, rgba(255, 230, 0, .55) 0%, transparent 70%);
        }

        .rs-orb.b {
            width: 150px;
            height: 150px;
            bottom: 90px;
            left: -55px;
            background: radial-gradient(circle, rgba(255, 255, 255, .35) 0%, transparent 70%);
        }

        .rs-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffe600;
            position: relative;
            z-index: 1;
            border-bottom: 2px dashed rgba(255, 255, 255, .35);
            padding-bottom: 12px;
        }

        .rs-head .rs-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffe600;
            display: inline-block;
            margin-right: 6px;
        }

        .rs-period {
            margin-top: 20px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #ffe600;
            position: relative;
            z-index: 1;
        }

        .rs-title {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -.5px;
            margin-top: 4px;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }

        .rs-hero {
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .rs-hero b {
            display: block;
            font-size: 66px;
            font-weight: 800;
            line-height: .9;
            color: #ffe600;
            text-shadow: 0 3px 0 rgba(0, 40, 140, .35);
        }

        .rs-hero span {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: .95;
        }

        .rs-stamps {
            margin-top: 12px;
            font-size: 19px;
            letter-spacing: 3px;
            line-height: 1.25;
            color: #ffe600;
            position: relative;
            z-index: 1;
            word-break: break-word;
        }

        .rs-stamps .more {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            opacity: .9;
        }

        .rs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
            position: relative;
            z-index: 1;
        }

        .rs-stat {
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .28);
            border-radius: 14px;
            padding: 12px 14px;
        }

        .rs-stat b {
            display: block;
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
            color: #fff;
        }

        .rs-stat span {
            font-size: 10.5px;
            font-weight: 700;
            opacity: .9;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .rs-spot {
            margin-top: 12px;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .28);
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rs-spot .rs-emoji {
            font-size: 26px;
            flex-shrink: 0;
        }

        .rs-spot .rs-lbl {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffe600;
        }

        .rs-spot .rs-val {
            font-size: 17px;
            font-weight: 800;
            line-height: 1.15;
            margin-top: 2px;
            word-break: break-word;
        }

        .rs-spot .rs-meta {
            font-size: 11px;
            opacity: .9;
            margin-top: 1px;
        }

        .rs-spot.hi {
            background: #ffe600;
            border-color: #ffe600;
            color: #10245e;
            transform: rotate(-1.5deg);
            box-shadow: 0 10px 24px rgba(0, 30, 120, .3);
        }

        .rs-spot.hi .rs-lbl {
            color: #fff;
            background: #0046ff;
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: .5px;
        }

        .rs-spot.hi .rs-val {
            color: #10245e;
            margin-top: 5px;
        }

        .rs-spot.hi .rs-meta {
            color: #10245e;
            opacity: .78;
        }

        .rs-foot {
            margin-top: auto;
            padding-top: 14px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            opacity: .95;
            border-top: 2px dashed rgba(255, 255, 255, .35);
        }

        .rs-foot .rs-brand {
            color: #ffe600;
            font-weight: 800;
        }

        .recap-story.export {
            padding: 72px 26px 110px;
        }

        .recap-story.export .rs-period {
            margin-top: 12px;
        }

        .recap-story.export .rs-title {
            font-size: 27px;
        }

        .recap-story.export .rs-hero {
            margin-top: 12px;
        }

        .recap-story.export .rs-hero b {
            font-size: 56px;
        }

        .recap-story.export .rs-grid {
            margin-top: 12px;
        }

        .recap-story.export .rs-orb.a {
            top: 40px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="top">
            <a href="../index.html" id="brandLink">
                <img src="../logo_seminggu.png" alt="Seminggu Satu">
                <div class="by">JOURNALING PASSPORT</div>
            </a>
        </div>

        <div class="hero-card" id="lookupCard">
            <div class="orb a"></div>
            <div class="orb b"></div>
            <h1>Perjalanan <span class="hl">Journaling</span> Kamu 🎒</h1>
            <p>Masukin nomor WhatsApp-mu buat lihat udah berapa kali kamu ikut event & bikin passport-mu!</p>
            <form class="lookup" id="lookupForm">
                <input type="tel" id="waInput" inputmode="numeric" placeholder="cth: 0812xxxxxxx" autocomplete="tel"
                    required>
                <button type="submit" id="lookupBtn">Lihat Perjalananku ✨</button>
            </form>
        </div>
        <p class="hint">Pakai nomor WhatsApp yang sama waktu kamu daftar event ya 🙌</p>

        <div class="spinner" id="spinner">
            <div class="ring"></div>
            <p>Lagi ngumpulin jejak journaling kamu…</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        var GS = (typeof GOOGLE_SCRIPT_URL !== "undefined") ? GOOGLE_SCRIPT_URL : "";
        var lastData = null;
        // Datang dari portal member -> logo & tombol balik ke portal (bukan home publik)
        var FROM_MEMBER = new URLSearchParams(location.search).get("from") === "member";
        if (FROM_MEMBER) { var _bl = document.getElementById("brandLink"); if (_bl) _bl.href = "../sahabat/"; }

        function esc(s) {
            return String(s == null ? "" : s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // Normalisasi ringan di sisi klien (backend juga normalisasi 0->62)
        function normWa(v) {
            var d = String(v || "").replace(/\D/g, "");
            if (d.indexOf("62") === 0) return d;
            if (d.indexOf("0") === 0) return d;
            if (d.indexOf("8") === 0) return "0" + d; // 812... -> 0812...
            return d;
        }

        function fetchJSONP(url, cbPrefix, timeoutMs) {
            return new Promise(function (resolve, reject) {
                var cb = cbPrefix + "_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
                var s = document.createElement("script");
                var to = setTimeout(function () {
                    reject(new Error("timeout"));
                    try { delete window[cb]; } catch (e) { }
                    if (s.parentNode) s.parentNode.removeChild(s);
                }, timeoutMs || 15000);
                window[cb] = function (data) {
                    clearTimeout(to);
                    resolve(data);
                    try { delete window[cb]; } catch (e) { }
                    if (s.parentNode) s.parentNode.removeChild(s);
                };
                s.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "callback=" + cb + "&_=" + Date.now();
                s.onerror = function () {
                    clearTimeout(to);
                    reject(new Error("network"));
                    try { delete window[cb]; } catch (e) { }
                    if (s.parentNode) s.parentNode.removeChild(s);
                };
                document.body.appendChild(s);
            });
        }

        // Persona / tier (samain sama admin passport)
        function persona(count, uniqueWs) {
            var title, tag;
            if (count >= 10) { title = "DEWA JOURNALING"; tag = "Warga kehormatan Seminggu Satu 👑"; }
            else if (count >= 6) { title = "LEGENDA JOURNALING"; tag = "Sahabat setia Seminggu Satu — udah dapat hadiah 🎁"; }
            else if (count >= 4) { title = "JOURNALING ENTHUSIAST"; tag = "Anak tongkrongan Seminggu Satu 🔥"; }
            else if (count >= 2) { title = "PETUALANG KREATIF"; tag = "Mulai betah kumpul bareng kita ✨"; }
            else { title = "PENDATANG BARU"; tag = "Baru gabung keluarga Seminggu Satu 🌱"; }
            var trait = uniqueWs >= 3 ? "Sang Penjelajah" : (count >= 3 ? "Si Paling Setia" : "Pencari Inspirasi");
            var emoji = count >= 10 ? "👑" : count >= 6 ? "🏆" : count >= 4 ? "🔥" : count >= 2 ? "✨" : "🌱";
            return { title: title, tag: tag, trait: trait, emoji: emoji };
        }

        function sinceYear(events) {
            var years = (events || []).map(function (e) {
                var mm = String(e.date || "").match(/(\d{4})$/); return mm ? Number(mm[1]) : null;
            }).filter(Boolean);
            return years.length ? Math.min.apply(null, years) : null;
        }

        function renderResult(d) {
            var res = document.getElementById("result");
            res.style.display = "block";

            if (!d || !d.found) {
                res.innerHTML =
                    '<div class="msg-card">' +
                    '<div class="em">🔍</div>' +
                    '<h3>Belum nemu jejakmu nih</h3>' +
                    '<p>Nomor ini belum kedaftar di event kami, atau salah ketik. Pastikan pakai nomor yang sama waktu daftar ya. Belum pernah ikut? Yuk mulai! 🌱</p>' +
                    '<a class="btn-primary" href="../index.html">Lihat Event Terdekat →</a>' +
                    '</div>';
                return;
            }

            var name = d.nickname || "Journaler";
            var count = d.count || 0;
            var target = d.target || 6;
            var progress = d.progress || 0;
            var uniqueWs = (function () {
                var set = {}; (d.events || []).forEach(function (e) { set[e.name] = 1; }); return Object.keys(set).length;
            })();
            var p = persona(count, uniqueWs);
            var since = sinceYear(d.events);
            var toGo = Math.max(0, target - progress);

            // Stamp dots buat siklus hadiah berjalan
            var stampsHtml = "";
            for (var i = 0; i < target; i++) {
                stampsHtml += '<div class="stamp' + (i < progress ? ' on' : '') + '">' + (i < progress ? '★' : '') + '</div>';
            }
            var rewardBox = d.eligible
                ? '<div class="eligible">🎉 Kamu dapat HADIAH GRATIS! Tunjukkin halaman ini ke admin ya.</div>'
                : '<div class="togo">' + (count === 0 ? '' : '<b>' + toGo + ' event lagi</b> buat dapat hadiah gratis 🎁') + '</div>';

            // Timeline
            var tl = "";
            (d.events || []).slice().reverse().forEach(function (e) {
                var when = e.eventDate || e.label || e.date || "";  // tanggal event (per batch), bukan tanggal daftar
                tl += '<div class="tl-item"><div class="nm">' + esc(e.name) + '</div>' +
                    (when ? '<div class="dt">' + esc(when) + '</div>' : '') + '</div>';
            });

            res.innerHTML =
                '<div class="greet">Hai, ' + esc(name) + '! 👋</div>' +

                '<div class="stat-cards">' +
                '<div class="scard"><b>' + count + '</b><span>Kali Kumpul Bareng</span></div>' +
                '<div class="scard"><b>' + (since || "🌱") + '</b><span>Sahabat Sejak</span></div>' +
                '</div>' +

                '<div class="tier"><div class="em">' + p.emoji + '</div><div><div class="t">' + esc(p.title) + '</div><div class="d">' + esc(p.tag) + '</div></div></div>' +

                '<div class="reward">' +
                '<div class="rtop"><b>Kartu Loyalty 🎁</b><span>' + progress + '/' + target + ' stamp</span></div>' +
                '<div class="stamps">' + stampsHtml + '</div>' +
                rewardBox +
                '</div>' +

                (tl ? ('<div class="section-title">Jejak Journaling-mu</div><div class="timeline">' + tl + '</div>') : '') +

                '<div class="section-title">Passport Kamu</div>' +
                '<div id="passportCard" class="recap-story"></div>' +
                '<div class="pp-actions">' +
                '<button class="btn-primary" id="ppShare">📲 Bagikan ke IG Story</button>' +
                '<a class="btn-ghost" href="' + (FROM_MEMBER ? "../sahabat/#events" : "../index.html") + '">Lihat Event Berikutnya →</a>' +
                '</div>' +
                '<p class="share-note">Pencet tombol → pilih <b>Instagram → Story</b>. Jangan lupa tag <b>@seminggu_satu</b> ya! 💙</p>';

            renderPassport(d, p, since, uniqueWs);
            document.getElementById("ppShare").addEventListener("click", sharePassport);
        }

        function renderPassport(d, p, since, uniqueWs) {
            var name = d.nickname || "Journaler";
            var MAX = 12;
            var shown = Math.min(d.count, MAX);
            var stampStr = "★".repeat(shown);
            var more = d.count > MAX ? '<span class="more"> +' + (d.count - MAX) + '</span>' : "";

            document.getElementById("passportCard").innerHTML =
                '<div class="rs-orb a"></div><div class="rs-orb b"></div>' +
                '<div class="rs-head"><span><span class="rs-dot"></span>Seminggu Satu</span><span>Passport</span></div>' +
                '<div class="rs-period">Journaling Passport</div>' +
                '<div class="rs-title">' + esc(name) + '</div>' +
                '<div class="rs-hero"><b>' + d.count + '</b><span>Kali kumpul bareng kita</span></div>' +
                '<div class="rs-stamps">' + stampStr + more + '</div>' +
                '<div class="rs-grid" style="grid-template-columns:repeat(3,1fr);">' +
                '<div class="rs-stat"><b>' + (since || "🌱") + '</b><span>Sahabat sejak</span></div>' +
                '<div class="rs-stat"><b>' + (d.questCount || 0) + '</b><span>⚡ Quest</span></div>' +
                '<div class="rs-stat"><b>' + (d.claimed || 0) + '</b><span>🎁 Hadiah</span></div>' +
                '</div>' +
                '<div class="rs-spot hi"><div class="rs-emoji">🎖️</div><div>' +
                '<div class="rs-lbl">' + esc(p.title) + '</div>' +
                '<div class="rs-val">' + esc(p.trait) + '</div>' +
                '<div class="rs-meta">' + esc(p.tag) + '</div>' +
                '</div></div>' +
                '<div class="rs-foot"><span>Bercerita & didengar ✨</span><span class="rs-brand">@seminggu_satu</span></div>';
        }

        // Render passport jadi PNG (1080x1920, safe zone IG Story)
        async function renderPassportPng() {
            var card = document.getElementById("passportCard");
            var clone = card.cloneNode(true);
            clone.classList.add("export");
            clone.style.width = "360px";
            clone.style.height = "640px";
            clone.style.minHeight = "0";
            clone.style.maxWidth = "none";
            clone.style.margin = "0";
            clone.style.position = "fixed";
            clone.style.left = "-10000px";
            clone.style.top = "0";
            document.body.appendChild(clone);
            try {
                var canvas = await html2canvas(clone, {
                    scale: 3, backgroundColor: null, useCORS: true,
                    width: 360, height: 640, windowWidth: 360, windowHeight: 640
                });
                return await new Promise(function (res) { canvas.toBlob(res, "image/png"); });
            } finally {
                if (clone.parentNode) clone.parentNode.removeChild(clone);
            }
        }

        // Bagikan ke IG Story lewat share sheet HP (navigator.share dgn file).
        // Kalau nggak didukung (mis. desktop) -> download + instruksi.
        async function sharePassport() {
            var btn = document.getElementById("ppShare");
            var label = btn.textContent;
            var nm = (lastData && lastData.nickname ? lastData.nickname : "peserta").trim().replace(/\s+/g, "-").toLowerCase() || "peserta";
            btn.disabled = true; btn.textContent = "Menyiapkan…";
            try {
                var blob = await renderPassportPng();
                if (!blob) throw new Error("no blob");
                var file = new File([blob], "passport-" + nm + ".png", { type: "image/png" });

                // HP modern: buka share sheet -> pilih Instagram -> Story
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: "Journaling Passport",
                            text: "Passport journaling-ku di Seminggu Satu! 💙 @seminggu_satu"
                        });
                    } catch (err) {
                        if (err && err.name === "AbortError") return; // user batal, diem aja
                        throw err;
                    }
                } else {
                    // Fallback (desktop / browser lama): download gambar
                    var a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "passport-" + nm + ".png";
                    a.click();
                    URL.revokeObjectURL(a.href);
                    alert("Gambar passport-mu udah ke-download 📥\nBuka Instagram → Story → pilih gambar ini buat di-post ya! Jangan lupa tag @seminggu_satu 💙");
                }
            } catch (e) {
                alert("Gagal menyiapkan gambar. Coba lagi ya.");
            } finally {
                btn.disabled = false; btn.textContent = label;
            }
        }

        async function doLookup(raw) {
            var wa = normWa(raw);
            if (!wa || wa.length < 8) { alert("Nomor WhatsApp-nya kurang lengkap ya 🙏"); return; }
            if (!GS) { alert("Konfigurasi belum siap. Coba refresh halaman."); return; }

            var btn = document.getElementById("lookupBtn");
            var spinner = document.getElementById("spinner");
            var res = document.getElementById("result");
            btn.disabled = true;
            res.style.display = "none";
            res.innerHTML = "";
            spinner.style.display = "block";

            try {
                var data = await fetchJSONP(GS + "?page=loyalty&wa=" + encodeURIComponent(wa), "loy", 20000);
                lastData = data;
                renderResult(data);
            } catch (err) {
                res.style.display = "block";
                res.innerHTML =
                    '<div class="msg-card"><div class="em">📡</div>' +
                    '<h3>Gagal terhubung</h3>' +
                    '<p>Koneksi ke server bermasalah. Cek internetmu lalu coba lagi ya.</p>' +
                    '<button class="btn-primary" onclick="location.reload()">Coba Lagi</button></div>';
            } finally {
                spinner.style.display = "none";
                btn.disabled = false;
            }
        }

        document.getElementById("lookupForm").addEventListener("submit", function (e) {
            e.preventDefault();
            doLookup(document.getElementById("waInput").value);
        });

        // Link prefilled dari admin: /loyalty/?wa=628xxxx -> langsung tampil
        (function () {
            var qp = new URLSearchParams(location.search);
            var wa = qp.get("wa");
            if (wa) {
                document.getElementById("waInput").value = wa;
                doLookup(wa);
            }
        })();
    </script>
</body>
